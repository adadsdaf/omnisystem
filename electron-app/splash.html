<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>OmniSystem</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      height: 280px;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      -webkit-app-region: no-drag;
    }

    .logo-bg {
      position: absolute;
      inset: 0;
      background: #FF3C00;
      border-radius: 24px;
      animation: pulse-bg 2s ease-in-out infinite;
    }

    .logo-text {
      position: relative;
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      z-index: 1;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulse-bg {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    .app-name {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .loading-bar-track {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    .loading-bar-fill {
      width: 40%;
      height: 100%;
      background: #FF3C00;
      border-radius: 2px;
      animation: loading-slide 1.5s ease-in-out infinite;
    }

    @keyframes loading-slide {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(400%); }
    }

    .status-text {
      margin-top: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.5px;
    }

    .fade-out {
      animation: fadeOut 0.6s ease-out forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo-bg"></div>
    <span class="logo-text">OS</span>
  </div>
  <div class="app-name">OmniSystem</div>
  <div class="loading-bar-track">
    <div class="loading-bar-fill"></div>
  </div>
  <div class="status-text">جاري تحميل النظام...</div>

  <script>
    window.electronAPI = {
      closeSplash: () => {
        document.body.classList.add('fade-out');
        setTimeout(() => window.close(), 600);
      }
    };
  </script>
</body>
</html>
