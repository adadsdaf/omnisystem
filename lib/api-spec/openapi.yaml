openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: POS System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: categories
  - name: orders
  - name: customers
  - name: users
  - name: dashboard
  - name: settings
  - name: reports
  - name: printConfig
  - name: printLog
  - name: printers

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
        - name: orderType
          in: query
          schema:
            type: string
            enum: [dine-in, takeout, delivery]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: List customers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Top selling products
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/sales-by-hour:
    get:
      operationId: getSalesByHour
      tags: [dashboard]
      summary: Sales by hour today
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByHour"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Sales report
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [day, month, year]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesReportRow"

  /print-config/receipt-copies:
    get:
      operationId: getReceiptCopyConfigs
      tags: [printConfig]
      summary: List receipt copy configs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReceiptCopyConfig"
    post:
      operationId: createReceiptCopyConfig
      tags: [printConfig]
      summary: Create receipt copy config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptCopyConfigInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptCopyConfig"

  /print-config/receipt-copies/{id}:
    put:
      operationId: updateReceiptCopyConfig
      tags: [printConfig]
      summary: Update receipt copy config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptCopyConfigInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptCopyConfig"
    delete:
      operationId: deleteReceiptCopyConfig
      tags: [printConfig]
      summary: Delete receipt copy config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /print-config/departments:
    get:
      operationId: getDepartmentPrintConfigs
      tags: [printConfig]
      summary: List department print configs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentPrintConfig"
    post:
      operationId: createDepartmentPrintConfig
      tags: [printConfig]
      summary: Create department print config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentPrintConfigInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentPrintConfig"

  /print-config/departments/{id}:
    put:
      operationId: updateDepartmentPrintConfig
      tags: [printConfig]
      summary: Update department print config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentPrintConfigInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentPrintConfig"
    delete:
      operationId: deleteDepartmentPrintConfig
      tags: [printConfig]
      summary: Delete department print config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /print-log:
    get:
      operationId: getPrintLogs
      tags: [printLog]
      summary: List print logs
      parameters:
        - name: orderId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrintLog"
    post:
      operationId: createPrintLog
      tags: [printLog]
      summary: Create print log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrintLogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrintLog"

  /printer-settings:
    get:
      operationId: getPrinterSettings
      tags: [printers]
      summary: Get printer layout settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrinterSettings"
    put:
      operationId: updatePrinterSettings
      tags: [printers]
      summary: Update printer layout settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrinterSettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrinterSettings"

  /printers/list:
    get:
      operationId: getPrintersList
      tags: [printers]
      summary: List available system printers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /printers/print:
    post:
      operationId: printReceiptDirect
      tags: [printers]
      summary: Print receipt directly to a named printer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectPrintInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  /print-log/reprint-count/{orderId}:
    get:
      operationId: getReprintCount
      tags: [printLog]
      summary: Get reprint count for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [reprintCount]
                properties:
                  reprintCount:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, name, role, active]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cashier]
        active:
          type: boolean

    UserInput:
      type: object
      required: [username, name, role, password]
      properties:
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cashier]
        password:
          type: string
        active:
          type: boolean

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, cashier]
        password:
          type: ["string", "null"]
        active:
          type: boolean

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: ["string", "null"]

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, name, number, price, active]
      properties:
        id:
          type: integer
        number:
          type: integer
        name:
          type: string
        price:
          type: number
        cost:
          type: ["number", "null"]
        barcode:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        active:
          type: boolean
        stock:
          type: ["integer", "null"]

    ProductInput:
      type: object
      required: [name, number, price]
      properties:
        name:
          type: string
        number:
          type: integer
        price:
          type: number
        cost:
          type: ["number", "null"]
        barcode:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        active:
          type: boolean
        stock:
          type: ["integer", "null"]

    OrderItem:
      type: object
      required: [productId, productName, quantity, unitPrice, total]
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        total:
          type: number
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, invoiceNumber, total, paymentMethod, createdAt]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        subtotal:
          type: number
        discount:
          type: number
        tax:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
          enum: [cash, card, mixed]
        cashAmount:
          type: ["number", "null"]
        cardAmount:
          type: ["number", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        userId:
          type: integer
        userName:
          type: string
        note:
          type: ["string", "null"]
        orderType:
          type: string
          enum: [dine-in, takeout, delivery]
        tableNumber:
          type: ["string", "null"]
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderItemInput:
      type: object
      required: [productId, quantity, unitPrice]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        unitPrice:
          type: number

    OrderInput:
      type: object
      required: [items, paymentMethod, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
        paymentMethod:
          type: string
          enum: [cash, card, mixed]
        subtotal:
          type: number
        discount:
          type: number
        tax:
          type: number
        total:
          type: number
        cashAmount:
          type: ["number", "null"]
        cardAmount:
          type: ["number", "null"]
        customerId:
          type: ["integer", "null"]
        userId:
          type: integer
        note:
          type: ["string", "null"]
        orderType:
          type: string
          enum: [dine-in, takeout, delivery]
        tableNumber:
          type: ["string", "null"]

    Customer:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        totalPurchases:
          type: number
        createdAt:
          type: string

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]

    DashboardSummary:
      type: object
      required: [todaySales, todayOrders, todayProfit, monthSales, monthOrders]
      properties:
        todaySales:
          type: number
        todayOrders:
          type: integer
        todayProfit:
          type: number
        monthSales:
          type: number
        monthOrders:
          type: integer
        totalProducts:
          type: integer
        totalCustomers:
          type: integer

    TopProduct:
      type: object
      required: [productId, productName, totalQty, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalQty:
          type: integer
        totalRevenue:
          type: number

    SalesByHour:
      type: object
      required: [hour, total, orders]
      properties:
        hour:
          type: integer
        total:
          type: number
        orders:
          type: integer

    Settings:
      type: object
      required: [businessName]
      properties:
        businessName:
          type: string
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        taxNumber:
          type: ["string", "null"]
        taxRate:
          type: number
        currency:
          type: string
        receiptMessage:
          type: ["string", "null"]
        printLogo:
          type: boolean
        printQr:
          type: boolean
        showCashier:
          type: boolean
        showCustomer:
          type: boolean
        receiptPaperSize:
          type: string
        showOrderNumber:
          type: boolean
        showTableNumber:
          type: boolean
        showDateTime:
          type: boolean
        showBarcode:
          type: boolean
        showOrderType:
          type: boolean
        showTax:
          type: boolean
        showDiscount:
          type: boolean
        showNotes:
          type: boolean
